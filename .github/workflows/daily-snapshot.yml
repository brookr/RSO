name: Daily RSO Snapshot

on:
  schedule:
    # GitHub schedules are UTC and may start late. Keep the target close to
    # the midnight UTC cutoff while leaving a small buffer after the boundary.
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Snapshot date, YYYY-MM-DD. Defaults to current UTC date."
        required: false
        type: string
      mode:
        description: "Snapshot mode. Auto uses genesis only on the official baseline date."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - daily
          - genesis
      overwrite:
        description: "Overwrite an existing snapshot for the selected date."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OFFICIAL_BASELINE_DATE: "2026-04-20"
      RSO_REQUEST_DELAY: "5"
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'github_release' }}
      UPLOAD_POLICY: ${{ vars.UPLOAD_POLICY || 'if_missing' }}
      RSO_RETAINED_CATALOG_COUNT: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.3"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Capture snapshot
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="auto"
          fi

          INPUT_DATE="${{ github.event.inputs.date }}"
          END_DATE="$(date -u +%F)"
          if [ -n "$INPUT_DATE" ]; then
            START_DATE="$INPUT_DATE"
            END_DATE="$INPUT_DATE"
          elif [ "$MODE" = "auto" ]; then
            START_DATE="$(python pipeline/snapshot.py next-date --end "$END_DATE")"
          else
            START_DATE="$END_DATE"
          fi

          echo "RSO_SNAPSHOT_START_DATE=$START_DATE" >> "$GITHUB_ENV"
          echo "RSO_SNAPSHOT_END_DATE=$END_DATE" >> "$GITHUB_ENV"
          echo "RSO_SNAPSHOT_DATE=$END_DATE" >> "$GITHUB_ENV"

          run_one_snapshot() {
            local snapshot_date="$1"
            local command
            if [ "$MODE" = "auto" ]; then
              if [ "$snapshot_date" = "$OFFICIAL_BASELINE_DATE" ]; then
                command="genesis"
              else
                command="daily"
              fi
            else
              command="$MODE"
            fi

            args=(pipeline/snapshot.py "$command" --date "$snapshot_date")
            if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
              args+=(--force)
            fi
            python "${args[@]}"
          }

          if [ "$START_DATE" != "$END_DATE" ]; then
            if [ "$MODE" != "auto" ]; then
              echo "Date catch-up only supports mode=auto."
              exit 1
            fi
            ROLL_FORWARD_END="$(python pipeline/snapshot.py previous-date --date "$END_DATE")"
            python pipeline/snapshot.py roll-forward --start "$START_DATE" --end "$ROLL_FORWARD_END"
            run_one_snapshot "$END_DATE"
          else
            run_one_snapshot "$END_DATE"
          fi

      - name: Validate captured archive
        run: |
          set -euo pipefail
          python pipeline/snapshot.py verify --date "$RSO_SNAPSHOT_DATE"
          python pipeline/snapshot.py validate

      - name: Build release bundles
        run: |
          set -euo pipefail
          python pipeline/snapshot.py publish --start "$RSO_SNAPSHOT_START_DATE" --end "$RSO_SNAPSHOT_END_DATE" --storage-backend none

      - name: Prune old catalogs from git archive
        run: |
          set -euo pipefail
          python pipeline/snapshot.py prune-catalogs --all --keep-latest "$RSO_RETAINED_CATALOG_COUNT" --require-bundle
          python pipeline/snapshot.py validate

      - name: Commit archive changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data ledger.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
            exit 0
          fi
          git commit -m "Archive RSO snapshot"
          git push

      - name: Publish release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          args=(pipeline/snapshot.py publish --start "$RSO_SNAPSHOT_START_DATE" --end "$RSO_SNAPSHOT_END_DATE" --use-existing-bundle)
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            args+=(--force)
          fi
          python "${args[@]}"
